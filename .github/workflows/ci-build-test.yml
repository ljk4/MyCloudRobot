name: CI - Build & Test

on: [push, pull_request]

# 全局默认使用 bash，避免 source 命令报错
defaults:
  run:
    shell: bash

jobs:
  test:
    runs-on: ubuntu-22.04 
    container: ros:humble
    
    steps:
      - uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          apt-get update
          apt-get install -y python3-pip
          rosdep update
          rosdep install --from-paths ros_ws/src --ignore-src -r -y || true

      - name: Build
        run: |
          source /opt/ros/humble/setup.bash
          colcon build --symlink-install

      - name: Lint & Unit Test
        run: |
          source /opt/ros/humble/setup.bash
          source install/setup.bash
          pip3 install pytest
          # 运行 colcon 测试 (如果失败不阻断构建，仅警告)
          colcon test --packages-select cloud_monitor_pkg || true
          colcon test-result --verbose

      - name: Run Integration Test
        shell: bash
        run: |
          source /opt/ros/humble/setup.bash
          source install/setup.bash
          
          echo "🚀 Starting path_planner node..."
          # 启动路径规划节点 (entry_point: path_planner)
          ros2 run cloud_monitor_pkg path_planner &
          
          # 等待节点启动
          sleep 5
          
          # 检查节点是否真的启动了 (节点内部名称为: path_planner)
          if ! ros2 node list | grep path_planner; then
            echo "❌ Error: Node path_planner did not start!"
            ros2 node list
            exit 1
          fi
          
          echo "🧪 Running integration tests..."
          pip3 install pytest --quiet
          
          # 运行集成测试
          python3 tests/integration_test.py