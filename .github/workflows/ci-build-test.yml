name: CI - Build & Test

on: [push, pull_request]

# 全局默认使用 bash，避免 source 命令报错
defaults:
  run:
    shell: bash

jobs:
  test:
    runs-on: ubuntu-22.04 
    container: ros:humble
    
    steps:
      - uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          apt-get update
          apt-get install -y python3-pip
          rosdep update
          rosdep install --from-paths ros_ws/src --ignore-src -r -y || true

      - name: Build
        run: |
          source /opt/ros/humble/setup.bash
          colcon build --symlink-install

      - name: Lint & Unit Test
        run: |
          source /opt/ros/humble/setup.bash
          source install/setup.bash
          pip3 install pytest
          # 运行 colcon 测试 (如果失败不阻断构建，仅警告)
          colcon test --packages-select cloud_monitor_pkg || true
          colcon test-result --verbose

      - name: Run Integration Test
        run: |
          source /opt/ros/humble/setup.bash
          source install/setup.bash
          
          echo "🚀 Starting param_service node..."
          ros2 run cloud_monitor_pkg param_service &
          sleep 5
          
          echo "🧪 Running integration tests..."
          pip3 install pytest
          python3 ros_ws/src/cloud_monitor_pkg/tests/integration_test.py