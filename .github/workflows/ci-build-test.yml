name: CI - Build & Test

on: [push, pull_request]

# 全局默认使用 bash，避免 source 命令报错
defaults:
  run:
    shell: bash

jobs:
  test:
    runs-on: ubuntu-22.04 
    container: ros:humble
    
    steps:
      - uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          apt-get update
          apt-get install -y python3-pip
          rosdep update
          rosdep install --from-paths ros_ws/src --ignore-src -r -y || true

      - name: Build
        run: |
          source /opt/ros/humble/setup.bash
          colcon build --symlink-install

      - name: Lint & Unit Test
        run: |
          source /opt/ros/humble/setup.bash
          source install/setup.bash
          pip3 install pytest
          # 运行 colcon 测试 (如果失败不阻断构建，仅警告)
          colcon test --packages-select cloud_monitor_pkg || true
          colcon test-result --verbose

      - name: Run Integration Test
        shell: bash
        run: |
          source /opt/ros/humble/setup.bash
          source install/setup.bash
          
          echo "🚀 Starting param_service node..."
          # 确保使用正确的可执行名 (与 setup.py entry_points 一致)
          # 如果 setup.py 写的是 'param_service = ...'，则这里用 param_service
          ros2 run cloud_monitor_pkg param_service &
          
          # 等待节点启动
          sleep 5
          
          # 检查节点是否真的启动了
          if ! ros2 node list | grep param_service_node; then
            echo "❌ Error: Node param_service_node did not start!"
            ros2 node list
            exit 1
          fi
          
          echo "🧪 Running integration tests..."
          pip3 install pytest --quiet
          
          # 🔴 关键修复：指向正确的项目根目录下的 tests 文件夹
          # 当前工作目录是 GitHub Workspace 根目录 (MyCloudRobot/)
          # 所以路径应该是 tests/integration_test.py
          python3 tests/integration_test.py