name: CI - Build & Test

on: 
  push:
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
  pull_request:
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'

# 全局默认使用 bash，避免 source 命令报错
defaults:
  run:
    shell: bash

jobs:
  test:
    runs-on: ubuntu-22.04 
    # 使用在此之前构建好的基础镜像，以跳过漫长的 apt-get install 过程
    # 注意：如果基础镜像更新了，需要手动触发 ci-base-image.yml 构建一次
    # 这里我们假设使用 owner 的 Docker Hub 用户名，或者硬编码为您的用户名
    # 由于 container 字段不支持 secrets 上下文，这里我们直接使用公共镜像
    container: liujiankang123/cloud-robot-viz-base:latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          # 基础镜像已包含大部分依赖，这里只做最小化检查
          # 如果有新增依赖，rosdep 会自动安装
          apt-get update
          rosdep update
          rosdep install --from-paths ros_ws/src --ignore-src -r -y || true

      - name: Build
        run: |
          source /opt/ros/humble/setup.bash
          colcon build --symlink-install

      - name: Lint & Unit Test
        run: |
          source /opt/ros/humble/setup.bash
          source install/setup.bash
          pip3 install pytest
          # 运行 colcon 测试 (如果失败不阻断构建，仅警告)
          colcon test --packages-select cloud_monitor_pkg || true
          colcon test-result --verbose

      - name: Run Integration Test
        shell: bash
        run: |
          source /opt/ros/humble/setup.bash
          source install/setup.bash
          
          echo "🚀 Starting path_planner node..."
          # 启动路径规划节点 (entry_point: path_planner)
          ros2 run cloud_monitor_pkg path_planner &
          
          # 等待节点启动
          sleep 5
          
          # 检查节点是否真的启动了 (节点内部名称为: path_planner)
          if ! ros2 node list | grep path_planner; then
            echo "❌ Error: Node path_planner did not start!"
            ros2 node list
            exit 1
          fi
          
          echo "🧪 Running integration tests..."
          pip3 install pytest --quiet
          
          # 运行集成测试
          python3 tests/integration_test.py