name: CI - Build & Test

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-22.04 
    container: ros:humble
    
    steps:
      - uses: actions/checkout@v4

      - name: Install System Dependencies (包括 pip3)
        run: |
          apt-get update
          # 🔴 关键修复：安装 python3-pip
          apt-get install -y python3-pip 
          
          # 安装 ROS 依赖
          rosdep update
          rosdep install --from-paths ros_ws/src --ignore-src -r -y

      - name: Build
        run: |
          source /opt/ros/humble/setup.bash
          colcon build --symlink-install

      - name: Lint (Code Quality)
        run: |
          source /opt/ros/humble/setup.bash
          # 只有安装了 pytest 才能运行测试
          pip3 install pytest 
          colcon test --packages-select cloud_monitor_pkg || true # 允许测试警告不阻断构建
          colcon test-result --verbose

      - name: Run Integration Test
        run: |
          source /opt/ros/humble/setup.bash
          source install/setup.bash
          
          # 启动节点 (后台)
          ros2 run cloud_monitor_pkg param_service &
          sleep 5
          
          # 运行 pytest 脚本
          # 🔴 确保 pytest 已安装
          pip3 install pytest
          python3 ros_ws/src/cloud_monitor_pkg/tests/integration_test.py