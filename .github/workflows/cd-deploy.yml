name: CD - Build & Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Build and Push (Multi-arch)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USER }}/cloud-robot-viz:latest
            ${{ secrets.DOCKER_USER }}/cloud-robot-viz:${{ github.sha }}
          platforms: linux/amd64,linux/arm64 # 支持不同架构
          cache-from: type=registry,ref=${{ secrets.DOCKER_USER }}/cloud-robot-viz:buildcache
          cache-to: type=inline

      - name: Deploy to Tencent Cloud
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.TENCENT_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          script: |
            echo "🔄 Pulling latest image..."
            docker pull ${{ secrets.DOCKER_USER }}/cloud-robot-viz:latest
            
            echo "🛑 Stopping old container..."
            docker stop cloud-viz || true
            docker rm cloud-viz || true
            
            echo "🚀 Starting new container..."
            docker run -d --restart=always --name cloud-viz \
              -p 80:80 -p 9090:9090 \
              ${{ secrets.DOCKER_USER }}/cloud-robot-viz:latest
            
            echo "✅ Deployment Complete!"
            docker ps