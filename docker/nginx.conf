# 以当前用户运行 (配合 Dockerfile 中的 USER robotuser)
# 如果报错，可能需要确保 /var/run/nginx.pid 目录有写权限
user robotuser; 
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid; # 关键：将 pid 文件放在 tmp 目录，避免非 root 用户无权限写入 /var/run

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    keepalive_timeout 65;

    server {
        listen 80;
        server_name localhost;

        # 根路径指向我们的 Web 可视化页面
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # 可选：如果需要将 WebSocket 也通过 Nginx 代理 (例如统一端口)
        # 目前架构是 Web(80) 和 Rosbridge(9090) 分开，此处仅作示例
        # location /ws {
        #     proxy_pass http://localhost:9090;
        #     proxy_http_version 1.1;
        #     proxy_set_header Upgrade $http_upgrade;
        #     proxy_set_header Connection "upgrade";
        # }

        # 错误页面自定义
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}