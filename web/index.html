<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Robot Viz - ROS 2 Web Control</title>
    <!-- 引入样式表 -->
    <link rel="stylesheet" href="static/style.css">
    <!-- 引入必要的库 -->
    <script src="https://cdn.jsdelivr.net/npm/eventemitter2@6.4.9/lib/eventemitter2.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/roslib@1/build/roslib.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; text-align: center; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: #1a73e8; margin-bottom: 20px; }
        #status { padding: 10px; margin-bottom: 20px; border-radius: 6px; font-weight: bold; background-color: #eee; }
        .connected { background-color: #d1fae5 !important; color: #065f46; }
        .disconnected { background-color: #fee2e2 !important; color: #991b1b; }
        
        canvas { background-color: #1e1e1e; border-radius: 8px; margin: 20px auto; display: block; box-shadow: inset 0 0 20px rgba(0,0,0,0.5); }
        
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        button { padding: 12px 24px; font-size: 16px; width: 100%; border: none; border-radius: 6px; cursor: pointer; transition: background 0.3s; color: white; font-weight: 600; }
        .btn-safe { background-color: #10b981; }
        .btn-safe:hover { background-color: #059669; }
        .btn-normal { background-color: #ef4444; }
        .btn-normal:hover { background-color: #dc2626; }
        
        #console { background: #2d3748; color: #a0aec0; padding: 15px; border-radius: 6px; text-align: left; height: 150px; overflow-y: auto; font-family: 'Consolas', monospace; font-size: 13px; }
        .log-entry { margin-bottom: 6px; border-bottom: 1px solid #4a5568; padding-bottom: 4px; }
        .log-time { color: #63b3ed; margin-right: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 Cloud Robot Dashboard</h1>
        
        <div id="status" class="disconnected">🔌 Status: Disconnected</div>

        <!-- 雷达可视化画布 -->
        <canvas id="vizCanvas" width="600" height="400"></canvas>

        <div class="controls">
            <button class="btn-safe" onclick="setSafetyMode(true)">🛡️ Enable Safety Mode (0.2 m/s)</button>
            <button class="btn-normal" onclick="setSafetyMode(false)">🚀 Normal Mode (0.8 m/s)</button>
        </div>

        <div id="console">
            <div class="log-entry">> System initialized... waiting for connection.</div>
        </div>
    </div>

    <script>
        // 1. 初始化 ROS 连接
        // 自动获取当前 host，不再硬编码 localhost/IP
        var ros = new ROSLIB.Ros({
            url: 'ws://' + window.location.hostname + ':9090'
        });

        // 2. 连接状态监听
        ros.on('connection', function() {
            updateStatus('Connected to ROS Bridge', true);
            log('WebSocket connection established.');
        });

        ros.on('error', function(error) {
            updateStatus('Error connecting to websocket', false);
            log('Connection error: ' + error);
        });

        ros.on('close', function() {
            updateStatus('Connection closed', false);
            log('Connection closed.');
        });

        // 3. 定义服务客户端
        var safetyClient = new ROSLIB.Service({
            ros : ros,
            name : '/set_safety_mode',
            serviceType : 'std_srvs/SetBool'
        });

        // 4. 调用服务的函数
        function setSafetyMode(isSafe) {
            var request = new ROSLIB.ServiceRequest({
                data : isSafe
            });

            log('Sending request: Check Safety Mode = ' + isSafe + '...');
            
            safetyClient.callService(request, function(result) {
                log('✅ Response: ' + result.message);
            });
        }

        // 5. 订阅并绘制雷达数据
        var listener = new ROSLIB.Topic({
            ros : ros,
            name : '/scan',
            messageType : 'sensor_msgs/LaserScan'
        });

        var canvas = document.getElementById('vizCanvas');
        var ctx = canvas.getContext('2d');
        var centerX = canvas.width / 2;
        var centerY = canvas.height / 2;
        var scale = 30; // 30 pixels per meter

        listener.subscribe(function(message) {
            // 清空画布
            ctx.fillStyle = '#1e1e1e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 绘制网格
            drawGrid(ctx);

            // 绘制机器人中心 (红点)
            ctx.beginPath();
            ctx.arc(centerX, centerY, 5, 0, 2 * Math.PI, false);
            ctx.fillStyle = '#ef4444';
            ctx.fill();

            // 绘制雷达扫描线 (绿色)
            ctx.beginPath();
            ctx.strokeStyle = '#10b981';
            ctx.lineWidth = 2;

            var angle_min = message.angle_min;
            var angle_increment = message.angle_increment;
            
            // 只需要渲染部分点以提高性能
            ctx.beginPath();
            for(var i = 0; i < message.ranges.length; i+=2) {
                var range = message.ranges[i];
                if(range < message.range_min || range > message.range_max) continue;

                var angle = angle_min + i * angle_increment;
                // Polar to Cartesian conversion
                // 旋转90度以符合常见机器人视图 (x forward)
                // x = range * cos(angle), y = range * sin(angle)
                // screenX = centerX - y * scale
                // screenY = centerY - x * scale
                var x = centerX - (range * Math.sin(angle)) * scale;
                var y = centerY - (range * Math.cos(angle)) * scale;

                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.stroke();
        });

        // 辅助函数：绘制网格
        function drawGrid(ctx) {
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 1;
            ctx.beginPath();
            // 垂直线
            for(var x = 0; x <= canvas.width; x += 50) {
                ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height);
            }
            // 水平线
            for(var y = 0; y <= canvas.height; y += 50) {
                ctx.moveTo(0, y); ctx.lineTo(canvas.width, y);
            }
            ctx.stroke();
            
            // 距离圆环 (1m, 2m, 3m...)
            ctx.strokeStyle = '#444';
            ctx.setLineDash([5, 5]);
            for(var r = 1; r <= 5; r++) {
                ctx.beginPath();
                ctx.arc(centerX, centerY, r * scale, 0, 2 * Math.PI);
                ctx.stroke();
            }
            ctx.setLineDash([]);
        }

        // 辅助函数：更新状态和日志
        function updateStatus(msg, isConnected) {
            var el = document.getElementById('status');
            el.textContent = '🔌 Status: ' + msg;
            el.className = isConnected ? 'connected' : 'disconnected';
        }

        function log(msg) {
            var consoleDiv = document.getElementById('console');
            var time = new Date().toLocaleTimeString();
            var entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerHTML = '<span class="log-time">[' + time + ']</span>' + msg;
            consoleDiv.insertBefore(entry, consoleDiv.firstChild);
            
            // Max 50 lines
            if(consoleDiv.children.length > 50) {
                consoleDiv.removeChild(consoleDiv.lastChild);
            }
        }
    </script>
</body>
</html>
