<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROS 2 Pathfinding Game</title>
    <script src="https://cdn.jsdelivr.net/npm/eventemitter2@6.4.9/lib/eventemitter2.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/roslib@1/build/roslib.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; text-align: center; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: #1a73e8; }
        #status { padding: 10px; margin-bottom: 20px; border-radius: 6px; font-weight: bold; }
        .connected { background-color: #d1fae5; color: #065f46; }
        .disconnected { background-color: #fee2e2; color: #991b1b; }
        
        canvas { border: 2px solid #333; cursor: crosshair; margin-bottom: 20px; touch-action: none; background: #fafafa; }
        
        .controls { margin-bottom: 20px; background: #eee; padding: 15px; border-radius: 10px; }
        button { padding: 10px 20px; font-size: 16px; margin: 5px; cursor: pointer; border: none; border-radius: 5px; color: white; transition: 0.2s; font-weight: bold; }
        button:hover { opacity: 0.9; transform: translateY(-1px); }
        button:active { transform: translateY(1px); }

        .btn-mode { background-color: #6b7280; }
        .btn-mode.active { background-color: #1a73e8; border: 2px solid #000; box-shadow: 0 0 5px rgba(0,0,0,0.3); }
        
        .btn-action { background-color: #10b981; }
        .btn-find { background-color: #3b82f6; } 
        .btn-clear { background-color: #f59e0b; }
        
        .info-panel { font-size: 18px; margin: 10px 0; min-height: 24px; color: #111827; font-weight: bold; padding: 10px; background: #e5e7eb; border-radius: 5px; }
        .instructions { font-size: 14px; color: #666; margin-bottom: 15px; line-height: 1.5; text-align: left; padding: 0 15px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 ROS 2 Maze Runner</h1>
        <div id="status" class="disconnected">🔌 Status: Disconnected</div>

        <!-- Mode Selection -->
        <div class="controls">
            <button class="btn-mode active" id="btn-challenge" onclick="switchMode('challenge')">🏆 Challenge Mode</button>
            <button class="btn-mode" id="btn-custom" onclick="switchMode('custom')">✏️ Custom Mode</button>
        </div>

        <!-- Instructions -->
        <div id="instructions-text" class="instructions"></div>

        <!-- Game Controls -->
        <div class="controls">
            <span id="challenge-controls">
                <button class="btn-action" onclick="generateMap()">🎲 New Random Level</button>
            </span>
            <span id="custom-controls" style="display:none;">
                <button class="btn-clear" onclick="resetMap()">🗑️ Clear Map</button>
            </span>
            <span style="border-left: 2px solid #ccc; margin-left: 10px; padding-left: 10px;">
                 <button class="btn-find" onclick="requestPath()">🤖 AI Solve (Hint)</button>
                 <button class="btn-clear" onclick="clearPath()">🧹 Clear Path</button>
            </span>
        </div>

        <div id="game-info" class="info-panel">Welcome! Select a mode to start.</div>

        <canvas id="gameCanvas" width="600" height="600"></canvas>
    </div>

    <script>
        // --- Configuration ---
        const GRID_SIZE = 20; 
        const CELL_SIZE = 30;
        const WIDTH = GRID_SIZE * CELL_SIZE;
        const HEIGHT = GRID_SIZE * CELL_SIZE;
        
        // --- State ---
        let currentMode = 'challenge'; // 'challenge' or 'custom'
        
        let startPos = null;
        let goalPos = null;
        let obstacles = new Set();  // "x,y"
        let aiPath = [];            // AI generated path (Blue)
        let userPath = [];          // User drawing path (Green)
        let isDrawing = false;
        
        // --- Canvas Setup ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // --- ROS Connection ---
        let ros = new ROSLIB.Ros({ url : 'ws://' + window.location.hostname + ':9090' });

        ros.on('connection', () => {
            document.getElementById('status').innerHTML = '✅ Connected to ROS 2';
            document.getElementById('status').className = 'connected';
        });
        
        ros.on('error', () => {
             document.getElementById('status').innerHTML = '❌ Connection Error (Is Backend Running?)';
             document.getElementById('status').className = 'disconnected';
        });

        ros.on('close', () => {
            document.getElementById('status').innerHTML = '🔌 Disconnected';
            document.getElementById('status').className = 'disconnected';
        });

        // Topics
        let requestTopic = new ROSLIB.Topic({
            ros : ros,
            name : '/game_request',
            messageType : 'std_msgs/String'
        });

        let responseTopic = new ROSLIB.Topic({
            ros : ros,
            name : '/game_response',
            messageType : 'std_msgs/String'
        });

        responseTopic.subscribe((message) => {
            console.log("Received path response");
            const result = JSON.parse(message.data);
            if (result.status === 'success') {
                aiPath = result.path.map(p => ({x: p[0], y: p[1]}));
                if(currentMode === 'custom') {
                    document.getElementById('game-info').innerText = `✅ AI found a path! Length: ${aiPath.length}`;
                } else {
                     document.getElementById('game-info').innerText = `💡 AI Hint received! Follow the blue line.`;
                }
                draw();
            } else {
                alert('⚠️ No path found! Is the goal blocked?');
                document.getElementById('game-info').innerText = `❌ No path possible.`;
            }
        });

        // --- Game Logic ---

        function switchMode(mode) {
            currentMode = mode;
            // Update UI Buttons
            document.getElementById('btn-challenge').className = mode === 'challenge' ? 'btn-mode active' : 'btn-mode';
            document.getElementById('btn-custom').className = mode === 'custom' ? 'btn-mode active' : 'btn-mode';
            
            document.getElementById('challenge-controls').style.display = mode === 'challenge' ? 'inline' : 'none';
            document.getElementById('custom-controls').style.display = mode === 'custom' ? 'inline' : 'none';
            
            // Instructions
            const text = mode === 'challenge' 
                ? "🏆 **Objective**: Connect the Green Start (S) to the Red Goal (G).<br>• 🖱️ <b>Drag Mouse</b>: Draw your path.<br>• 🤖 <b>AI Solve</b>: Get a hint if you are stuck."
                : "✏️ **Creative Mode**: Design your own maze!<br>• 🖱️ <b>Left Click</b>: Set Start.<br>• 🖱️ <b>Right Click</b>: Set Goal.<br>• ⌨️ <b>Shift+Click</b>: Add/Remove Walls.";
            document.getElementById('instructions-text').innerHTML = text;

            resetMap(); // This will trigger generateMap for challenge mode
        }

        function generateMap() {
            // Reset state
            startPos = {x: 1, y: 1};
            goalPos = {x: GRID_SIZE-2, y: GRID_SIZE-2};
            obstacles.clear();
            aiPath = [];
            userPath = [];
            
            // Random Obstacles
            // Create a guaranteed path (simple maze generation is hard, so just random noise + clear start/end)
            for(let x=0; x<GRID_SIZE; x++){
                for(let y=0; y<GRID_SIZE; y++){
                    // Keep start/goal area clear
                    if(dist({x,y}, startPos) < 2 || dist({x,y}, goalPos) < 2) continue;
                    
                    // 25% chance of wall
                    if(Math.random() < 0.25) {
                         obstacles.add(`${x},${y}`);
                    }
                }
            }
            
            document.getElementById('game-info').innerText = "🎲 New Level Generated. Draw your path!";
            draw();
        }

        function resetMap() {
            startPos = null;
            goalPos = null;
            obstacles.clear();
            clearPath();
            
            if(currentMode === 'challenge') {
                return generateMap();
            }
            
            document.getElementById('game-info').innerText = "Map Cleared. Set Start and Goal to begin.";
            draw();
        }

        function clearPath() {
            aiPath = [];
            userPath = [];
            draw();
            if(currentMode === 'challenge') document.getElementById('game-info').innerText = "Path cleared. Try again!";
        }

        // --- Interaction ---
        
        function getMousePos(evt) {
            const rect = canvas.getBoundingClientRect();
            return {
                x: Math.floor((evt.clientX - rect.left) / CELL_SIZE),
                y: Math.floor((evt.clientY - rect.top) / CELL_SIZE)
            };
        }

        canvas.addEventListener('mousedown', (evt) => {
            const pos = getMousePos(evt);
            if (isOutOfBounds(pos)) return;

            if (currentMode === 'challenge') {
                // Drawing logic - Start drawing if clicking on Start Pos
                if (pos.x === startPos.x && pos.y === startPos.y) {
                    isDrawing = true;
                    userPath = [pos];
                    draw();
                }
            } else {
                // Custom Mode Logic
                if (evt.shiftKey) { // Toggle Wall
                    const key = `${pos.x},${pos.y}`;
                    if (obstacles.has(key)) obstacles.delete(key);
                    else obstacles.add(key);
                } else if (evt.button === 2) { // Right Click = Goal
                    goalPos = pos;
                } else { // Left Click = Start
                    startPos = pos;
                }
                draw();
            }
        });

        canvas.addEventListener('mousemove', (evt) => {
            if (currentMode === 'challenge' && isDrawing) {
                const pos = getMousePos(evt);
                if (isOutOfBounds(pos)) return;

                // Add to path if valid move
                const last = userPath[userPath.length - 1];
                
                // Allow moving to adjacent cells only
                if (dist(pos, last) === 1) {
                    
                    if (isWall(pos)) return; // Cannot move through walls
                
                    // Check if backtracking (remove loop)
                    const index = userPath.findIndex(p => p.x === pos.x && p.y === pos.y);
                    if (index !== -1) {
                         // Truncate path if moving backwards
                         userPath = userPath.slice(0, index + 1);
                    } else {
                         userPath.push(pos);
                    }
                    
                    draw();

                     // Check Win Condition
                    if (pos.x === goalPos.x && pos.y === goalPos.y) {
                        isDrawing = false;
                        document.getElementById('game-info').innerText = "🎉 Congratulations! You reached the goal!";
                        // Confetti effect or alert
                        setTimeout(() => alert("🎉 You Win!"), 50);
                    }
                }
            }
        });

        canvas.addEventListener('mouseup', () => { isDrawing = false; });
        canvas.addEventListener('mouseleave', () => { isDrawing = false; });
        canvas.addEventListener('contextmenu', e => e.preventDefault());

        // --- Helpers ---
        function dist(a, b) { return Math.abs(a.x - b.x) + Math.abs(a.y - b.y); }
        function isOutOfBounds(p) { return p.x < 0 || p.x >= GRID_SIZE || p.y < 0 || p.y >= GRID_SIZE; }
        function isWall(p) { return obstacles.has(`${p.x},${p.y}`); }

        function requestPath() {
            if (!startPos || !goalPos) {
                alert('Please set Start and Goal first!');
                return;
            }
            
            const payload = {
                start: [startPos.x, startPos.y],
                goal: [goalPos.x, goalPos.y],
                obstacles: Array.from(obstacles).map(s => s.split(',').map(Number)),
                width: GRID_SIZE, height: GRID_SIZE
            };
            
            console.log("Sending request...", payload);
            requestTopic.publish(new ROSLIB.Message({data: JSON.stringify(payload)}));
            document.getElementById('game-info').innerText = "🤖 AI Thinking...";
        }

        // --- Drawing ---
        function draw() {
            ctx.clearRect(0, 0, WIDTH, HEIGHT);
            
            // Grid
            ctx.strokeStyle = '#eee';
            ctx.lineWidth = 1;
            for(let i=0; i<=GRID_SIZE; i++) {
                ctx.beginPath(); ctx.moveTo(i*CELL_SIZE, 0); ctx.lineTo(i*CELL_SIZE, HEIGHT); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, i*CELL_SIZE); ctx.lineTo(WIDTH, i*CELL_SIZE); ctx.stroke();
            }

            // Obstacles
            ctx.fillStyle = '#374151';
            obstacles.forEach(key => {
                const [x,y] = key.split(',').map(Number);
                ctx.fillRect(x*CELL_SIZE, y*CELL_SIZE, CELL_SIZE, CELL_SIZE);
            });

            // AI Path (Blue line, semi-transparent)
            if(aiPath.length > 0) {
                ctx.globalAlpha = 0.5;
                drawPathLine(aiPath, '#60a5fa', 8);
                ctx.globalAlpha = 1.0;
            }

            // User Path (Green solid)
            if(userPath.length > 0) drawPathLine(userPath, '#10b981', 6);

            // Start & Goal
            if(startPos) drawMarker(startPos.x, startPos.y, '#10b981', 'S');
            if(goalPos) drawMarker(goalPos.x, goalPos.y, '#ef4444', 'G');
        }

        function drawPathLine(path, color, width) {
            ctx.lineWidth = width;
            ctx.strokeStyle = color;
            ctx.lineJoin = 'round';
            ctx.lineCap = 'round';
            ctx.beginPath();
            
            // Draw lines between cell centers
            if(path.length > 0) {
                const startX = path[0].x*CELL_SIZE + CELL_SIZE/2;
                const startY = path[0].y*CELL_SIZE + CELL_SIZE/2;
                ctx.moveTo(startX, startY);
            }
            
            for(let i=0; i<path.length; i++) {
                const px = path[i].x*CELL_SIZE + CELL_SIZE/2;
                const py = path[i].y*CELL_SIZE + CELL_SIZE/2;
                ctx.lineTo(px, py);
            }
            ctx.stroke();
        }

        function drawMarker(x, y, color, label) {
            const cx = x*CELL_SIZE + CELL_SIZE/2;
            const cy = y*CELL_SIZE + CELL_SIZE/2;
            
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(cx, cy, CELL_SIZE/2 - 2, 0, Math.PI*2);
            ctx.fill();
            
            ctx.shadowColor = "rgba(0,0,0,0.5)";
            ctx.shadowBlur = 4;
            ctx.fillStyle = 'white';
            ctx.font = 'bold 16px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(label, cx, cy+1);
            ctx.shadowBlur = 0;
        }

        // --- Init ---
        // Wait for page load
        window.onload = function() {
            switchMode('challenge');
            draw();
        };

    </script>
</body>
</html>
